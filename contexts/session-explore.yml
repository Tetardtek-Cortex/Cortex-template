# session-explore.yml v2 ‚Äî Sessions V2 (ADR-047)
# Posture : je reflechis / navigue
# Absorbe : navigate, brainstorm, coach, capital, audit
# Trigger : "brain boot explore[/<scope>]"
# Cible : ~18% contexte max au boot

session_type: explore
description: "Session d'exploration ‚Äî navigation, brainstorm, coaching, audit"
tier_required: free

# L0 ‚Äî Invariant (~4%) ‚Äî TOUJOURS charge
L0:
  - PATHS.md
  - brain-compose.local.yml
  - KERNEL.md

# L1 ‚Äî Session type (~10%) ‚Äî tier free
L1:
  - now.md                          # bridge session precedente
  - focus.md                        # direction actuelle
  - agents/coach-boot.md            # garde comportemental (free)
  - BRAIN-INDEX.md                  # claims actifs + signaux
  - todo/README.md                  # index intentions

# L1_featured ‚Äî coach complet pour sessions reflexion
L1_featured:
  - agents/coach.md                 # coach complet ‚Äî mentorat, bilan, structure

# L2 ‚Äî Scope conditionnel (~4%)
L2:
  template: "projets/{project}.md"
  extras: []
  fallback: null

# L3 ‚Äî On demand (0% au boot)
# Agents charges a la demande selon scope :
#   /brainstorm ‚Üí wiki/patterns.md (brainstorm-before-build enforcement)
#   /coach      ‚Üí metabolism/README.md, profil/collaboration.md (coach dimension primaire)
#   /capital    ‚Üí profil/objectifs.md, profil/capital.md, progression/README.md
#   /audit      ‚Üí agents/security.md, agents/code-review.md (write-lock implicite)
#   (vide)      ‚Üí lobby navigate : agents/guide.md, agents/pathfinder.md, agents/catalogist.md
L3:
  hint: "Charger selon scope : brainstorm‚Üípatterns, coach‚Üímetabolism, capital‚Üíprofil, audit‚Üísecurity+review"

# --- Comportements absorbes ---
# navigate   : lobby pattern (scope vide = navigation legere)
#              agents guide/catalogist/pathfinder charges en L3 sur scope vide
# brainstorm : pas de code, pas de commit ‚Äî reflexion pure
#              wiki/patterns.md charge en L3 (brainstorm-before-build)
# coach      : coach.md devient dimension primaire (override contexte projet)
#              metabolisme + collaboration charges en L3
# capital    : profil/objectifs.md + profil/capital.md charges en L3
#              capital-scribe auto-trigger sur changement capital.md
# audit      : write-lock implicite (lecture seule sauf rapport final)
#              agents security + code-review charges en L3

# --- Gates ---
gates:
  audit_write_lock: "scope /audit ‚Üí lecture seule, toute ecriture refusee sauf rapport"

# --- Metriques cibles ---
context_target:
  L0: "~4%"
  L1: "~10%"
  L2: "~4%"
  total_boot: "~18%"
